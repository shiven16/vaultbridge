name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'DEPLOY_SCRIPT'
            set -e

            # ──────────────────────────
            # Setup Node.js v20
            # ──────────────────────────
            # Load NVM to upgrade Node if it exists
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              \. "$NVM_DIR/nvm.sh"
              nvm install 20
              nvm use 20
              nvm alias default 20
              # Ensure pm2 is available on the new node version
              npm install -g pm2
            fi
            
            # Verify node version and force upgrade via apt if needed
            NODE_MAJOR=$(node -v | cut -d. -f1 | sed 's/v//')
            if [ "$NODE_MAJOR" -lt 20 ]; then
                echo "⚠️ Node.js is v$NODE_MAJOR. Upgrading to Node.js v20..."
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
                
                # Re-verify post-install
                NODE_MAJOR_NEW=$(node -v | cut -d. -f1 | sed 's/v//')
                if [ "$NODE_MAJOR_NEW" -lt 20 ]; then
                  echo "❌ Failed to install Node.js v20. Current version is v$NODE_MAJOR_NEW."
                  exit 1
                fi
                echo "✅ Successfully upgraded Node.js to v$NODE_MAJOR_NEW"
                
                # Reinstall pm2 globally for the new node version
                sudo npm install -g pm2
            fi

            APP_DIR=~/vaultbridge

            # Clone or pull latest code
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main

            # ──────────────────────────
            # Backend
            # ──────────────────────────
            echo "Setting up backend..."
            cd "$APP_DIR/backend"
            npm install --production
            npx prisma generate

            # Restart backend with PM2
            if pm2 describe vaultbridge-backend > /dev/null 2>&1; then
              pm2 restart vaultbridge-backend
            else
              pm2 start npm --name vaultbridge-backend -- run start
            fi

            # ──────────────────────────
            # Frontend
            # ──────────────────────────
            echo "📦 Setting up frontend..."
            cd "$APP_DIR/frontend"
            npm install
            npm run build

            # Serve frontend static files with PM2
            if pm2 describe vaultbridge-frontend > /dev/null 2>&1; then
              pm2 restart vaultbridge-frontend
            else
              pm2 start npx --name vaultbridge-frontend -- serve dist -s -l 4173
            fi

            echo "Deployment complete!"
          DEPLOY_SCRIPT

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/ec2_key
